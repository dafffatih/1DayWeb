name = "freelance-website"
compatibility_date = "2024-04-05"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# Bind a D1 database. D1 is Cloudflare's native serverless SQL database.
# Docs: https://developers.cloudflare.com/d1/get-started/
[[d1_databases]]
binding = "DB"
database_name = "freelance-db"
database_id = "YOUR_DATABASE_ID_HERE"
migrations_dir = "drizzle"

# Bind an R2 Bucket. R2 is Cloudflare's object storage.
# Docs: https://developers.cloudflare.com/r2/get-started/
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "freelance-storage"
